[pytest]
# ─── E2E 测试配置 ────────────────────────────────────────────
# 在 tests/e2e/ 目录运行 pytest 即可
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认参数: 顺序跑 (避免并发启动多个 streamlit), 加 v 头部
addopts =
    -v
    --tb=short
    --strict-markers
    --durations=10
    -p no:cacheprovider
    --browser=chromium
    --browser-channel=chrome

# pytest-playwright 选项
# --headed  → 显示浏览器 (本地调试用)
# --browser-channel=chrome  → 用本地 Chrome 替代 chromium
# --slowmo=200              → 每个操作加 200ms 延时, 看清楚

markers =
    smoke: 冒烟测试, 关键路径
    regression: 回归测试, 完整功能
    slow: 耗时 >10s 的用例
